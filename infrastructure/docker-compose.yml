version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 18151995    # change si tu veux, mais note-le !
      POSTGRES_DB: stilles_auto
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  # 2. RabbitMQ (Pour les messages futurs)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: stilles_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # 3. MinIO (Pour les images Véhicules/Accessoires)
  minio:
    image: minio/minio
    container_name: stilles_minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console Web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data


volumes:
  pgdata:
  minio_data: